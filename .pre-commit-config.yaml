ci:
  skip: [pyright]

exclude: "typings|tests"

repos:

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
    - id: check-added-large-files
    - id: check-ast
    - id: check-case-conflict
    - id: check-docstring-first
    - id: check-executables-have-shebangs
    - id: check-json
    - id: check-merge-conflict
      args:
        - --assume-in-merge
    - id: check-shebang-scripts-are-executable
    - id: check-symlinks
    - id: check-toml
    - id: check-vcs-permalinks
    - id: check-xml
    - id: check-yaml
    - id: debug-statements
    - id: destroyed-symlinks
    # - id: detect-aws-credentials
    - id: detect-private-key
    - id: end-of-file-fixer
    - id: mixed-line-ending
    - id: requirements-txt-fixer
    - id: trailing-whitespace
    - id: name-tests-test
      args:
      - --pytest-test-first
    - id: no-commit-to-branch
    - id: pretty-format-json
      args: ['--autofix']
    # - id: sort-simple-yaml
        # files: .pre-commit-config.yaml

- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v2.3.0
  hooks:
  - id: mypy
    name: mypy
    language: python
    language_version: python 3.10
    types: [python]
    require_serial: true
    verbose: true
    # additional_dependencies: ['types-requests']
    # exclude: "tests"
    # args:
    # - --ignore-missing-imports
    # files: ^(src/|tests/)

- repo: https://github.com/asottile/pyupgrade
  rev: v3.21.2
  hooks:
  - args:
    - --py310-plus
    id: pyupgrade

- repo: https://github.com/Lucas-C/pre-commit-hooks
  rev: v1.5.6
  hooks:
  - id: remove-tabs

# ruff config (select/ignore/fixable/target-version) lives in pyproject.toml
- repo: https://github.com/charliermarsh/ruff-pre-commit
  rev: 'v0.15.22'
  hooks:
    - id: ruff
      args: ["--fix"]
    - id: ruff-format
      name: "ruff-format"

# basedpyright config (select/ignore/fixable/target-version) lives in pyproject.toml
-   repo: https://github.com/DetachHead/basedpyright-pre-commit-mirror
    rev: 1.39.9
    hooks:
    -   id: basedpyright
